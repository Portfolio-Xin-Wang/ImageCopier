name: Continuous Integration for Meiosis

on:
  push:
    branches:
      - main, dev
  pull_request:
    branches:
      - main, dev

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      # Install dependencies using installation script
      - name: Install dependencies
        run: |
          ./installation/installation.sh
      # Run tests
      - name: Run unit tests
        run: |
          echo "Running tests with pytest..."
          ./.github/integration/unit_test.sh