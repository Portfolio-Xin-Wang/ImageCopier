name: Continuous Integration for Meiosis

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      # Install dependencies using installation script
      - name: Install dependencies
        run: |
          chmod +x ./installation/installation.sh
          ./installation/installation.sh
      - name: Run unit tests
        run: |
          echo "Running tests with pytest..."
          chmod +x ./.github/integration/unit_test.sh
          ./.github/integration/unit_test.sh

          